services:
  app:
    container_name: lodo-app
    build:
      context: ./app
      dockerfile: .docker/Dockerfile
      target: development
    command: bun run dev
    restart: unless-stopped
    depends_on: [api]
    volumes: [./app:/app, /app/node_modules]
    networks: [lodo-network, proxy]
    environment:
      NODE_ENV: development
      REACT_APP_API_URL: https://api.lodorecords.local
      WDS_SOCKET_HOST: lodorecords.local
      WDS_SOCKET_PORT: 443
      ESLINT_CACHE: 'false'
    labels:
      traefik.enable: true
      traefik.http.routers.lodo-app-router.rule: Host(`lodorecords.local`)
      traefik.http.routers.lodo-app-router.entrypoints: websecure
      traefik.http.routers.lodo-app-router.tls: true
      traefik.http.services.lodo-app-service.loadbalancer.server.port: 3000

  api:
    container_name: lodo-api
    build:
      context: ./api
      dockerfile: .docker/Dockerfile
      target: development
    restart: unless-stopped
    depends_on: [mongodb]
    volumes: [./api:/app, /app/node_modules]
    networks: [lodo-network]
    environment:
      NODE_ENV: development
      DEV_BYPASS_AUTH: true
      MONGODB_URI: mongodb://admin:password123@mongodb:27017/lodorecords
      PORT: 5000
    labels:
      traefik.enable: true
      traefik.http.routers.lodo-api-router.rule: Host(`api.lodorecords.local`)
      traefik.http.routers.lodo-api-router.entrypoints: websecure
      traefik.http.routers.lodo-api-router.tls: true
      traefik.http.services.lodo-api-service.loadbalancer.server.port: 5000

  mongodb:
    container_name: lodo-mongodb
    image: mongo:7.0
    restart: unless-stopped
    command: ['--auth', '--quiet']
    volumes: [mongodb_data:/data/db]
    networks: [lodo-network]
    environment:
      MONGO_INITDB_DATABASE: lodorecords
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123

  .mongo-express:
    container_name: lodo-mongo-express
    image: mongo-express:latest
    restart: unless-stopped
    depends_on: [mongodb]
    networks: [lodo-network]
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    labels:
      traefik.enable: true
      traefik.http.routers.lodo-db-router.rule: Host(`db.lodorecords.local`)
      traefik.http.routers.lodo-db-router.entrypoints: websecure
      traefik.http.routers.lodo-db-router.tls: true
      traefik.http.services.lodo-db-service.loadbalancer.server.port: 8080

volumes:
  mongodb_data:

networks:
  lodo-network:
    driver: bridge
  proxy:
    external: true
