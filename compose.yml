services:
  mongodb:
    image: mongo:7.0
    container_name: lodo-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: lodorecords
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
    volumes:
      - mongodb_data:/data/db
    networks:
      - lodo-network
    command: ["--auth"]

  mongo-express:
    image: mongo-express:latest
    container_name: lodo-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:password123@mongodb:27017/admin
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    depends_on:
      - mongodb
    networks:
      - lodo-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lodo-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - DEV_BYPASS_AUTH=true
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/lodorecords
      - PORT=5000
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app
      - /app/node_modules
    networks:
      - lodo-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lodo-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:5000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - lodo-network

volumes:
  mongodb_data:

networks:
  lodo-network:
    driver: bridge